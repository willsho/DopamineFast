name: DopamineFast
options:
  bundleIdPrefix: com.willwang
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  DopamineFast:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
      - iOS Simulator
    sources:
      - DopamineFast
    dependencies:
      - target: ShieldConfigurationExtension
        embed: true
      - target: ShieldActionExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willwang.dopaminefast
        PRODUCT_NAME: Dopamine Fast
        INFOPLIST_FILE: DopamineFast/Info.plist
        CODE_SIGN_ENTITLEMENTS: DopamineFast/DopamineFast.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTED_DESTINATIONS: "iOS iOSSimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_VERSION: "6.0"
    info:
      path: DopamineFast/Info.plist
      properties:
        CFBundleDisplayName: Dopamine Fast
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    supportedDestinations:
      - iOS
      - iOS Simulator
    sources:
      - ShieldConfigurationExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willwang.dopaminefast.ShieldConfigurationExtension
        PRODUCT_NAME: ShieldConfigurationExtension
        INFOPLIST_FILE: ShieldConfigurationExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTED_DESTINATIONS: "iOS iOSSimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_VERSION: "6.0"
    info:
      path: ShieldConfigurationExtension/Info.plist
      properties:
        CFBundleDisplayName: Dopamine Shield
        NSExtension:
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigurationExtension
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration-service
  ShieldActionExtension:
    type: app-extension
    platform: iOS
    supportedDestinations:
      - iOS
      - iOS Simulator
    sources:
      - ShieldActionExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.willwang.dopaminefast.ShieldActionExtension
        PRODUCT_NAME: ShieldActionExtension
        INFOPLIST_FILE: ShieldActionExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShieldActionExtension/ShieldActionExtension.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTED_DESTINATIONS: "iOS iOSSimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_VERSION: "6.0"
    info:
      path: ShieldActionExtension/Info.plist
      properties:
        CFBundleDisplayName: Dopamine Shield Action
        NSExtension:
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldActionExtension
          NSExtensionPointIdentifier: com.apple.ManagedSettings.shield-action-service
schemes:
  DopamineFast:
    build:
      targets:
        DopamineFast: all
        ShieldConfigurationExtension: all
        ShieldActionExtension: all
    run:
      config: Debug
    archive:
      config: Release
